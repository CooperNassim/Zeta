<!DOCTYPE html>
<html>
<head>
    <title>Test API</title>
</head>
<body>
    <h1>测试心理测试 API</h1>
    <button onclick="testCreate()">测试创建</button>
    <button onclick="testUpdate()">测试更新</button>
    <button onclick="testGet()">测试查询</button>
    <pre id="result"></pre>

    <script>
        function log(msg) {
            const pre = document.getElementById('result');
            pre.textContent += msg + '\n';
        }

        async function testCreate() {
            log('\n=== 测试创建 ===');
            try {
                const response = await fetch('http://localhost:3001/api/psychological_test_results', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        scores: { 1: 2, 2: 1, 3: 2, 4: 1, 5: 2 },
                        overall_score: 8,
                        test_date: '2026-03-13'
                    })
                });
                const result = await response.json();
                log('Status: ' + response.status);
                log('Response: ' + JSON.stringify(result, null, 2));
            } catch (error) {
                log('Error: ' + error.message);
            }
        }

        async function testUpdate() {
            log('\n=== 测试更新 ===');
            try {
                const response = await fetch('http://localhost:3001/api/psychological_test_results', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        scores: { 1: 1, 2: 0, 3: 1, 4: 2, 5: 0 },
                        overall_score: 4,
                        test_date: '2026-03-13'
                    })
                });
                const result = await response.json();
                log('Status: ' + response.status);
                log('Response: ' + JSON.stringify(result, null, 2));
            } catch (error) {
                log('Error: ' + error.message);
            }
        }

        async function testGet() {
            log('\n=== 测试查询 ===');
            try {
                const response = await fetch('http://localhost:3001/api/psychological_test_results');
                const result = await response.json();
                log('Status: ' + response.status);
                log('Response: ' + JSON.stringify(result, null, 2));
            } catch (error) {
                log('Error: ' + error.message);
            }
        }
    </script>
</body>
</html>
